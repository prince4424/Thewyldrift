<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Wyldrift Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <header class="store-header admin-topbar">
      <a class="store-logo" href="index.html" aria-label="The Wyldrift storefront">
        <span>The</span>
        <strong>Wyldrift</strong>
      </a>
      <nav class="nav-links" aria-label="Admin navigation">
        <a href="index.html">Storefront</a>
        <a href="#product-form">Add Product</a>
        <button class="nav-button" id="logout-button" type="button">Logout</button>
      </nav>
    </header>

    <main class="admin-shell">
      <section class="login-panel" id="login-panel" aria-labelledby="login-title">
        <form class="admin-form login-form" id="login-form">
          <p class="eyebrow">Protected admin</p>
          <h1 id="login-title">Login</h1>
          <label>
            Admin passkey
            <input id="passkey" name="passkey" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" class="primary-button">Login</button>
          <p class="form-message" id="login-message" role="status"></p>
        </form>
      </section>

      <section class="admin-hero" aria-labelledby="admin-title">
        <div>
          <p class="eyebrow">Store manager</p>
          <h1 id="admin-title">Products</h1>
        </div>
        <div class="admin-stats" aria-label="Store stats">
          <div>
            <span>Total</span>
            <strong id="total-products">0</strong>
          </div>
          <div>
            <span>Live</span>
            <strong id="live-products">0</strong>
          </div>
          <div>
            <span>Stock</span>
            <strong id="total-stock">0</strong>
          </div>
        </div>
      </section>

      <section class="admin-layout" id="admin-layout">
        <form class="admin-form" id="product-form">
          <h2 id="form-title">Add product</h2>
          <input type="hidden" id="product-id" />
          <input type="hidden" id="existing-images" />

          <label>
            Product name
            <input id="productName" name="productName" type="text" placeholder="Oversized black tee" required />
          </label>

          <label>
            Category
            <select id="category" name="category" required>
              <option value="T-Shirts">T-Shirts</option>
              <option value="Jeans">Jeans</option>
              <option value="Shoes">Shoes</option>
              <option value="Accessories">Accessories</option>
            </select>
          </label>

          <label>
            Price
            <input id="price" name="price" type="number" min="0" step="1" placeholder="999" required />
          </label>

          <label>
            Discount price
            <input id="discountPrice" name="discountPrice" type="number" min="0" step="1" placeholder="799" />
          </label>

          <label>
            Stock
            <input id="stock" name="stock" type="number" min="0" step="1" value="1" required />
          </label>

          <label>
            SKU
            <input id="sku" name="sku" type="text" placeholder="TW-TEE-001" required />
          </label>

          <label>
            Sizes
            <input id="sizes" name="sizes" type="text" placeholder="S, M, L, XL" />
          </label>

          <label>
            Colors
            <input id="colors" name="colors" type="text" placeholder="Black, White" />
          </label>

          <label>
            Tags
            <input id="tags" name="tags" type="text" placeholder="streetwear, cotton, new" />
          </label>

          <label>
            Product images
            <input id="images" name="images" type="file" accept="image/png,image/jpeg,image/webp,image/avif" multiple />
          </label>

          <div class="image-preview" id="image-preview"></div>

          <label class="toggle-row">
            <input id="featured" name="featured" type="checkbox" />
            Featured product
          </label>

          <label>
            Product details
            <textarea id="description" name="description" rows="4" placeholder="Fabric, fit, sizes, color options" required></textarea>
          </label>

          <label class="toggle-row">
            <input id="active" name="active" type="checkbox" checked />
            Show on storefront
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-button">Save product</button>
            <button type="button" class="secondary-button" id="reset-form">Clear</button>
          </div>

          <p class="form-message" id="form-message" role="status"></p>
        </form>

        <section class="admin-products" aria-labelledby="list-title">
          <div class="list-toolbar">
            <h2 id="list-title">Product listing</h2>
            <div class="search-field">
              <input id="search" type="search" placeholder="Search products" aria-label="Search products" />
              <span class="search-hint" aria-hidden="true">Ctrl /</span>
            </div>
          </div>
          <div class="admin-product-list" id="admin-product-list"></div>
        </section>
      </section>
    </main>

    <div class="toast-stack" id="toast-stack" aria-live="polite" aria-relevant="additions"></div>
    <script src="admin.js"></script>
  </body>
</html>
